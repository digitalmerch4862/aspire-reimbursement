  <!-- "Aspire" -->
  <text x="100" y="130" text-anchor="middle" fill="white"
    font-family="Arial, Helvetica, sans-serif"
    font-size="30" font-weight="bold" letter-spacing="0.5">Aspire</text>

  <!-- "Homes" -->
  <text x="100" y="163" text-anchor="middle" fill="white"
    font-family="Arial, Helvetica, sans-serif"
    font-size="30" font-weight="bold" letter-spacing="0.5">Homes</text>
</svg>
