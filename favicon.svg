<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Aspire Homes">
  <!-- Purple circle background -->
  <circle cx="100" cy="100" r="100" fill="#3B32C4"/>

  <!-- Dot starburst pattern (outer ring, small/faint) -->
  <circle cx="100" cy="28" r="2.2" fill="white" opacity="0.5"/>
  <circle cx="120" cy="30" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="139" cy="36" r="2.2" fill="white" opacity="0.6"/>
  <circle cx="155" cy="46" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="167" cy="60" r="2.2" fill="white" opacity="0.5"/>
  <circle cx="80"  cy="30" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="61"  cy="36" r="2.2" fill="white" opacity="0.6"/>
  <circle cx="45"  cy="46" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="33"  cy="60" r="2.2" fill="white" opacity="0.5"/>

  <!-- Middle ring -->
  <circle cx="100" cy="40" r="3"   fill="white" opacity="0.7"/>
  <circle cx="119" cy="43" r="3"   fill="white" opacity="0.72"/>
  <circle cx="136" cy="51" r="3"   fill="white" opacity="0.75"/>
  <circle cx="150" cy="63" r="3"   fill="white" opacity="0.72"/>
  <circle cx="159" cy="79" r="3"   fill="white" opacity="0.7"/>
  <circle cx="81"  cy="43" r="3"   fill="white" opacity="0.72"/>
  <circle cx="64"  cy="51" r="3"   fill="white" opacity="0.75"/>
  <circle cx="50"  cy="63" r="3"   fill="white" opacity="0.72"/>
  <circle cx="41"  cy="79" r="3"   fill="white" opacity="0.7"/>

  <!-- Inner ring (larger, bright) -->
  <circle cx="100" cy="54" r="4"   fill="white" opacity="0.9"/>
  <circle cx="117" cy="57" r="4"   fill="white" opacity="0.92"/>
  <circle cx="131" cy="66" r="4"   fill="white" opacity="0.95"/>
  <circle cx="141" cy="79" r="4"   fill="white" opacity="0.92"/>
  <circle cx="146" cy="94" r="4"   fill="white" opacity="0.9"/>
  <circle cx="83"  cy="57" r="4"   fill="white" opacity="0.92"/>
  <circle cx="69"  cy="66" r="4"   fill="white" opacity="0.95"/>
  <circle cx="59"  cy="79" r="4"   fill="white" opacity="0.92"/>
  <circle cx="54"  cy="94" r="4"   fill="white" opacity="0.9"/>

  <!-- Centre dot -->
